<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance">
<meta name="theme-color" content="#111111">
<title>My Finance Tracker</title>

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23111111'/%3E%3Crect x='80' y='160' width='352' height='220' rx='28' fill='%23ffffff'/%3E%3Crect x='80' y='160' width='352' height='60' rx='28' fill='%23e8e8e8'/%3E%3Crect x='80' y='188' width='352' height='32' fill='%23e8e8e8'/%3E%3Crect x='270' y='210' width='132' height='120' rx='16' fill='%231D9E75'/%3E%3Ccircle cx='336' cy='270' r='30' fill='%23ffffff' opacity='0.25'/%3E%3Ctext x='336' y='280' font-family='system-ui' font-size='36' font-weight='700' fill='%23ffffff' text-anchor='middle'%3E%E2%82%B9%3C/text%3E%3Crect x='108' y='240' width='130' height='14' rx='7' fill='%23111111' opacity='0.12'/%3E%3Crect x='108' y='268' width='90' height='14' rx='7' fill='%23111111' opacity='0.08'/%3E%3Crect x='80' y='348' width='352' height='32' rx='14' fill='%231D9E75' opacity='0.15'/%3E%3C/svg%3E">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, system-ui, sans-serif;
  background: #f2f2f7;
  color: #111;
  min-height: 100vh;
  padding-bottom: calc(1rem + env(safe-area-inset-bottom));
}

.header {
  background: #111;
  color: #fff;
  padding: 1rem 1.25rem;
  padding-top: calc(1rem + env(safe-area-inset-top));
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.month-nav { display: flex; align-items: center; gap: 6px; }
.month-nav button {
  background: rgba(255,255,255,0.15);
  border: none; border-radius: 6px;
  padding: 5px 11px; cursor: pointer;
  font-size: 15px; color: #fff;
}
.month-label { font-size: 14px; font-weight: 500; min-width: 118px; text-align: center; color: #fff; }

.container { max-width: 600px; margin: 0 auto; padding: 1rem; }

.section-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.07em; color: #888;
  text-transform: uppercase; margin-bottom: 8px;
}

.top-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
.metric {
  background: #fff; border-radius: 12px;
  padding: 11px 12px;
  box-shadow: 0 0.5px 0 rgba(0,0,0,0.08);
}
.metric-label { font-size: 11px; color: #999; margin-bottom: 3px; }
.metric-value { font-size: 15px; font-weight: 600; line-height: 1.2; }

.card {
  background: #fff; border-radius: 12px;
  padding: 14px 16px; margin-bottom: 1rem;
  box-shadow: 0 0.5px 0 rgba(0,0,0,0.08);
}

.savings-bar-track { height: 8px; background: #f0f0f0; border-radius: 6px; overflow: hidden; margin: 8px 0 5px; }
.savings-bar-fill { height: 100%; background: #1D9E75; border-radius: 6px; transition: width 0.4s; }
.savings-bar-meta { display: flex; justify-content: space-between; font-size: 11px; color: #999; }

.goal-edit { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid #f0f0f0; }
.goal-edit label { font-size: 12px; color: #888; white-space: nowrap; }
.goal-edit input {
  flex: 1; padding: 7px 10px;
  border: 0.5px solid #e0e0e0; border-radius: 8px;
  font-size: 14px; background: #fafafa; color: #111;
  -webkit-appearance: none;
}
.goal-edit button {
  padding: 7px 14px; background: #111; color: #fff;
  border: none; border-radius: 8px; font-size: 13px;
  font-weight: 500; cursor: pointer;
}

.field { margin-bottom: 10px; }
.field label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; font-weight: 500; }
.field select, .field input {
  width: 100%; padding: 10px 12px;
  border: 0.5px solid #e0e0e0; border-radius: 10px;
  font-size: 15px; background: #fafafa; color: #111;
  -webkit-appearance: none; appearance: none;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn {
  flex: 1; padding: 12px;
  border-radius: 10px; border: none;
  font-size: 15px; cursor: pointer;
  font-weight: 600;
}
.btn.primary { background: #111; color: #fff; }
.btn.danger { background: #fff0f0; color: #E24B4A; }

.spend-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1rem; }
.cat-card {
  background: #fff; border-radius: 12px;
  padding: 11px 13px;
  box-shadow: 0 0.5px 0 rgba(0,0,0,0.08);
}
.cat-label { font-size: 11px; color: #888; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cat-amount { font-size: 17px; font-weight: 600; }

.chart-wrap {
  position: relative; width: 100%; height: 260px;
  margin-bottom: 1rem; background: #fff;
  border-radius: 12px; padding: 1rem;
  box-shadow: 0 0.5px 0 rgba(0,0,0,0.08);
}

.log-item {
  display: flex; justify-content: space-between;
  align-items: center; padding: 10px 0;
  border-bottom: 0.5px solid #f5f5f5;
}
.log-item:last-child { border-bottom: none; }
.log-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.log-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.log-info { min-width: 0; }
.log-desc { font-size: 14px; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.log-date { font-size: 11px; color: #bbb; margin-top: 1px; }
.log-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.log-amt { font-size: 14px; font-weight: 600; }
.del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 2px 4px; }

.empty { font-size: 13px; color: #bbb; text-align: center; padding: 1.5rem 0; }

.toast {
  position: fixed;
  bottom: calc(1.5rem + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%);
  background: #111; color: #fff;
  padding: 10px 22px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity 0.25s;
  pointer-events: none; z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

.install-banner {
  background: #1D9E75; color: #fff;
  padding: 10px 16px; font-size: 13px;
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px;
}
.install-banner span { flex: 1; line-height: 1.4; }
.install-banner button {
  background: rgba(255,255,255,0.2);
  border: none; border-radius: 6px;
  color: #fff; font-size: 12px; font-weight: 600;
  padding: 5px 10px; cursor: pointer; white-space: nowrap;
}
</style>
</head>
<body>

<div class="install-banner" id="install-banner">
  <span>Tip: tap Share &#8594; "Add to Home Screen" to use this like an app!</span>
  <button onclick="document.getElementById('install-banner').style.display='none'">Got it</button>
</div>

<div class="header">
  <h1>Finance Tracker</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="month-label"></div>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
</div>

<div class="container">

  <div class="section-label" style="margin-top:0.5rem;">Overview</div>
  <div class="top-grid">
    <div class="metric"><div class="metric-label">Cash at start</div><div class="metric-value" style="color:#378ADD;" id="m-opening">₹0</div></div>
    <div class="metric"><div class="metric-label">Income</div><div class="metric-value" style="color:#1D9E75;" id="m-income">₹0</div></div>
    <div class="metric"><div class="metric-label">Spent</div><div class="metric-value" style="color:#E24B4A;" id="m-spent">₹0</div></div>
    <div class="metric"><div class="metric-label">Saved</div><div class="metric-value" style="color:#378ADD;" id="m-saved">₹0</div></div>
    <div class="metric"><div class="metric-label">Balance</div><div class="metric-value" id="m-balance">₹0</div></div>
    <div class="metric"><div class="metric-label">Goal</div><div class="metric-value" style="color:#1D9E75;" id="m-goal">₹10,000</div></div>
  </div>

  <div class="card">
    <div class="section-label">Savings goal</div>
    <div class="savings-bar-track"><div class="savings-bar-fill" id="savings-bar" style="width:0%"></div></div>
    <div class="savings-bar-meta"><span id="savings-pct">0%</span><span id="savings-rem"></span></div>
    <div class="goal-edit">
      <label>Change goal: ₹</label>
      <input type="number" id="goal-input" placeholder="e.g. 10000" min="0" inputmode="numeric">
      <button onclick="updateGoal()">Set</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Add entry</div>
    <div class="field">
      <label>Type</label>
      <select id="entry-type" onchange="onTypeChange()">
        <option value="expense">Expense</option>
        <option value="income">Income received</option>
        <option value="saving">Savings transfer</option>
        <option value="opening">Opening balance</option>
      </select>
    </div>
    <div class="field" id="cat-field">
      <label>Category</label>
      <select id="entry-cat">
        <option value="Dining">Dining</option>
        <option value="Coffee">Coffee / Tea</option>
        <option value="Groceries">Groceries</option>
        <option value="Transport">Transport</option>
        <option value="Personal care">Personal care</option>
        <option value="Health">Health</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Amount (₹)</label>
        <input type="number" id="entry-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="entry-date">
      </div>
    </div>
    <div class="field">
      <label>Description (optional)</label>
      <input type="text" id="entry-desc" placeholder="e.g. Swiggy lunch">
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="addEntry()">Add entry</button>
      <button class="btn danger" onclick="clearMonth()">Clear month</button>
    </div>
  </div>

  <div class="section-label">Spending by category</div>
  <div class="spend-grid" id="cat-grid"><div class="empty">No spending yet</div></div>

  <div class="chart-wrap"><canvas id="spendChart"></canvas></div>

  <div class="card">
    <div class="section-label">All entries</div>
    <div id="log-list"><div class="empty">No entries yet.</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const COLORS = {
  Dining:'#D85A30', 'Coffee / Tea':'#854F0B', Groceries:'#1D9E75',
  Transport:'#378ADD', 'Personal care':'#7F77DD', Health:'#D4537E',
  Entertainment:'#534AB7', Shopping:'#BA7517', Bills:'#888780', Other:'#639922'
};
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let currentYear, currentMonth, chartInst = null;

function monthKey(y,m){ return y+'-'+String(m).padStart(2,'0'); }
function getKey(){ return monthKey(currentYear,currentMonth); }
function loadData(key){
  try{ return JSON.parse(localStorage.getItem('ft_inr_'+key))||{entries:[],goal:10000}; }
  catch(e){ return {entries:[],goal:10000}; }
}
function saveData(key,data){ localStorage.setItem('ft_inr_'+key,JSON.stringify(data)); }

function fmt(n){
  const abs = Math.abs(n);
  const str = abs.toFixed(2);
  const parts = str.split('.');
  const lastThree = parts[0].slice(-3);
  const otherNums = parts[0].slice(0,-3);
  const formatted = otherNums.replace(/\B(?=(\d{2})+(?!\d))/g,',') + (otherNums ? ',' : '') + lastThree;
  return '₹' + formatted + '.' + parts[1];
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>12){currentMonth=1;currentYear++;}
  if(currentMonth<1){currentMonth=12;currentYear--;}
  render();
}

function onTypeChange(){
  document.getElementById('cat-field').style.display =
    document.getElementById('entry-type').value==='expense' ? '' : 'none';
}

function updateGoal(){
  const val=parseFloat(document.getElementById('goal-input').value);
  if(isNaN(val)||val<=0){showToast('Enter a valid goal');return;}
  const data=loadData(getKey());
  data.goal=val; saveData(getKey(),data);
  document.getElementById('goal-input').value='';
  showToast('Goal updated!'); render();
}

function addEntry(){
  const type=document.getElementById('entry-type').value;
  const amount=parseFloat(document.getElementById('entry-amount').value);
  const desc=document.getElementById('entry-desc').value.trim();
  const dateVal=document.getElementById('entry-date').value;
  const cat=document.getElementById('entry-cat').value;
  if(isNaN(amount)||amount<=0){showToast('Enter a valid amount');return;}
  const dateStr=dateVal
    ? new Date(dateVal+'T12:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})
    : 'Today';
  const data=loadData(getKey());
  data.entries.push({type,amount,desc,date:dateStr,category:cat,id:Date.now()});
  saveData(getKey(),data);
  document.getElementById('entry-amount').value='';
  document.getElementById('entry-desc').value='';
  showToast('Added!'); render();
}

function deleteEntry(id){
  const data=loadData(getKey());
  data.entries=data.entries.filter(e=>e.id!==id);
  saveData(getKey(),data);
  showToast('Deleted'); render();
}

function clearMonth(){
  if(!confirm('Clear all entries for '+MONTHS[currentMonth-1]+'?'))return;
  const data=loadData(getKey());
  data.entries=[]; saveData(getKey(),data); render();
}

function render(){
  const data=loadData(getKey());
  const entries=data.entries;
  const goal=data.goal||10000;

  document.getElementById('month-label').textContent=MONTHS[currentMonth-1]+' '+currentYear;
  document.getElementById('m-goal').textContent=fmt(goal);

  const opening=entries.filter(e=>e.type==='opening').reduce((a,e)=>a+e.amount,0);
  const income =entries.filter(e=>e.type==='income').reduce((a,e)=>a+e.amount,0);
  const spent  =entries.filter(e=>e.type==='expense').reduce((a,e)=>a+e.amount,0);
  const saved  =entries.filter(e=>e.type==='saving').reduce((a,e)=>a+e.amount,0);
  const balance=opening+income-spent-saved;
  const pct=Math.min(100,Math.round((saved/goal)*100));

  document.getElementById('m-opening').textContent=fmt(opening);
  document.getElementById('m-income').textContent=fmt(income);
  document.getElementById('m-spent').textContent=fmt(spent);
  document.getElementById('m-saved').textContent=fmt(saved);
  const balEl=document.getElementById('m-balance');
  balEl.textContent=(balance<0?'-':'')+fmt(balance);
  balEl.style.color=balance<0?'#E24B4A':'#1D9E75';

  document.getElementById('savings-bar').style.width=pct+'%';
  document.getElementById('savings-pct').textContent=pct+'% of '+fmt(goal);
  document.getElementById('savings-rem').textContent=
    saved>=goal ? 'Goal reached!' : fmt(Math.max(0,goal-saved))+' to go';

  const totals={};
  entries.filter(e=>e.type==='expense').forEach(e=>{
    totals[e.category]=(totals[e.category]||0)+e.amount;
  });

  const catGrid=document.getElementById('cat-grid');
  if(!Object.keys(totals).length){
    catGrid.innerHTML='<div class="empty">No spending yet</div>';
  } else {
    catGrid.innerHTML=Object.entries(totals).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`
      <div class="cat-card">
        <div class="cat-label"><span class="cat-dot" style="background:${COLORS[cat]||'#888'}"></span>${cat}</div>
        <div class="cat-amount">${fmt(amt)}</div>
      </div>`).join('');
  }

  renderChart(totals);

  const logEl=document.getElementById('log-list');
  if(!entries.length){ logEl.innerHTML='<div class="empty">No entries yet.</div>'; return; }
  logEl.innerHTML=[...entries].reverse().map(e=>{
    const isIncome=e.type==='income', isSaving=e.type==='saving', isOpening=e.type==='opening';
    const dot=isIncome?'#1D9E75':isSaving?'#378ADD':isOpening?'#378ADD':(COLORS[e.category]||'#888');
    const amtColor=isIncome||isSaving||isOpening?'color:#378ADD;':'';
    const prefix=isIncome?'+':isSaving?'saved ':'';
    const label=e.desc||(isIncome?'Income':isSaving?'Savings transfer':isOpening?'Opening balance':e.category);
    return `<div class="log-item">
      <div class="log-left">
        <span class="log-dot" style="background:${dot}"></span>
        <div class="log-info">
          <div class="log-desc">${label}</div>
          <div class="log-date">${e.date}</div>
        </div>
      </div>
      <div class="log-right">
        <span class="log-amt" style="${amtColor}">${prefix}${fmt(e.amount)}</span>
        <button class="del-btn" onclick="deleteEntry(${e.id})">&#x2715;</button>
      </div>
    </div>`;
  }).join('');
}

function renderChart(totals){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const labels=Object.keys(totals);
  const data=Object.values(totals);
  const colors=labels.map(l=>COLORS[l]||'#888');
  const canvas=document.getElementById('spendChart');
  if(!labels.length){
    chartInst=new Chart(canvas,{
      type:'bar',
      data:{labels:Object.keys(COLORS),datasets:[{data:new Array(Object.keys(COLORS).length).fill(0),backgroundColor:Object.values(COLORS),borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'₹'+v}}}}
    });
    return;
  }
  chartInst=new Chart(canvas,{
    type:labels.length===1?'bar':'doughnut',
    data:{
      labels:labels.map((l,i)=>l+' '+fmt(data[i])),
      datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff',borderRadius:labels.length===1?4:0}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:labels.length>1,position:'bottom',labels:{font:{size:11},padding:12,boxWidth:10}},
        tooltip:{callbacks:{label:ctx=>' '+ctx.label}}
      },
      scales:labels.length===1?{y:{beginAtZero:true,ticks:{callback:v=>'₹'+v}}}:{}
    }
  });
}

const now=new Date();
currentYear=now.getFullYear();
currentMonth=now.getMonth()+1;
document.getElementById('entry-date').valueAsDate=now;
onTypeChange();
render();
</script>
</body>
</html>
